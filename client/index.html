<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Dublin's #1 print shop for personal and business printing. Same day click & collect. Business cards, flyers, posters, banners and more. Est. 1982." />
    <meta property="og:title" content="Copyprint.ie - Dublin's #1 Print Shop Since 1982" />
    <meta property="og:description" content="Professional printing services in Dublin since 1982. Business cards, flyers, posters, banners, stickers and more. Same day click & collect." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://copyprint.ie" />
    <meta property="og:site_name" content="Copyprint.ie" />
    <meta property="og:locale" content="en_IE" />
    <meta property="og:image" content="https://copyprint.ie/images/og-logo.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="400" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://copyprint.ie/images/og-logo.jpg" />
    <link rel="canonical" href="https://copyprint.ie/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Copyprint.ie",
      "url": "https://copyprint.ie",
      "description": "Dublin's #1 Print Shop Since 1982. Professional printing services including business cards, flyers, posters, banners, stickers and more.",
      "publisher": {
        "@type": "Organization",
        "name": "Copyprint.ie",
        "url": "https://copyprint.ie",
        "logo": {
          "@type": "ImageObject",
          "url": "https://copyprint.ie/images/og-logo.jpg"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://copyprint.ie/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=optional"></noscript>
    <style>
      #root:not(.hydrated) { opacity: 1; }
      #root.ssr-pending { opacity: 0; transition: opacity 0.15s ease; }
      #root.hydrated { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script>
      (function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          root.classList.add('ssr-pending');
          setTimeout(function() { root.classList.add('hydrated'); root.classList.remove('ssr-pending'); }, 3000);
        }
      })();
    </script>
    <div id="google_translate_element" style="display:none;position:absolute;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,es,fr,de,pt,zh-CN,pl,ar',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
      function setLanguage(lang) {
        if (lang === 'en') {
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.' + location.hostname;
          location.reload();
          return;
        }
        document.cookie = 'googtrans=/en/' + lang + '; path=/;';
        document.cookie = 'googtrans=/en/' + lang + '; path=/; domain=.' + location.hostname;
        location.reload();
      }
      window.setLanguage = setLanguage;
      (function() {
        var obs = new MutationObserver(function() {
          document.body.style.setProperty('top', '0px', 'important');
          var f = document.querySelectorAll('.goog-te-banner-frame, iframe.goog-te-banner-frame');
          f.forEach(function(el) { el.style.display = 'none'; });
          var s = document.querySelectorAll('body > .skiptranslate');
          s.forEach(function(el) { el.style.display = 'none'; });
        });
        obs.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
      })();
      (function loadTranslateLater() {
        function load() {
          var s = document.createElement('script');
          s.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
          s.async = true;
          document.body.appendChild(s);
        }
        if (window.requestIdleCallback) {
          requestIdleCallback(function() { setTimeout(load, 1500); });
        } else {
          setTimeout(load, 3000);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
