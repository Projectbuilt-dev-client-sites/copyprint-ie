<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Copyprint.ie - Dublin's #1 Print Shop Since 1982</title>
    <meta name="description" content="Dublin's #1 print shop for personal and business printing. Same day click & collect. Business cards, flyers, posters, banners and more. Est. 1982." />
    <meta property="og:title" content="Copyprint.ie - Dublin's #1 Print Shop Since 1982" />
    <meta property="og:description" content="Professional printing services in Dublin since 1982. Business cards, flyers, posters, banners, stickers and more. Same day click & collect." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://copyprint.ie" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
      #root:not(.hydrated) { opacity: 1; }
      #root.ssr-pending { opacity: 0; transition: opacity 0.15s ease; }
      #root.hydrated { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script>
      (function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          root.classList.add('ssr-pending');
          setTimeout(function() { root.classList.add('hydrated'); root.classList.remove('ssr-pending'); }, 3000);
        }
      })();
    </script>
    <div id="google_translate_element" class="hidden fixed top-[70px] right-4 z-[60] bg-white rounded-lg shadow-xl p-2"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
